<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sopa de Letras: Derechos Humanos Pro</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e67e22; /* Color más llamativo */
            --bg: #ecf0f1;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .watermark {
            position: fixed;
            bottom: 20px;
            right: 20px;
            opacity: 0.2;
            font-size: 28px;
            font-weight: 900;
            color: var(--primary);
            pointer-events: none;
            z-index: 1000;
            text-transform: uppercase;
        }

        #grid {
            display: grid;
            /* Cuadrícula más grande: 15x15 */
            grid-template-columns: repeat(15, 30px);
            grid-template-rows: repeat(15, 30px);
            gap: 2px;
            background: #95a5a6;
            padding: 8px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            user-select: none;
        }

        .cell {
            width: 30px;
            height: 30px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.1s;
        }

        .cell:hover { background: #dfe6e9; }
        .cell.selected { background: #fdcb6e; transform: scale(1.1); z-index: 2; }
        .cell.found { background: #2ecc71; color: white; }

        #word-list {
            margin-top: 20px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 450px;
        }

        .word-item { color: #bdc3c7; font-weight: bold; text-align: center; }
        .word-item.strikethrough { color: #27ae60; text-decoration: line-through; }

        /* Estilo del anuncio (Modal) */
        #modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        #modal {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 450px;
            text-align: center;
            border-top: 8px solid var(--accent);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1 style="color: var(--primary)">Sopa de Letras: Clasificaciones</h1>
    <p>Busca en horizontal, vertical, <b>diagonal</b> y al <b>revés</b>.</p>

    <div id="grid"></div>

    <div id="word-list">
        </div>

    <div class="watermark">ANGEL CAAMAL</div>

    <div id="modal-overlay">
        <div id="modal">
            <h2 id="modal-title" style="color: var(--accent)"></h2>
            <p id="modal-desc" style="line-height: 1.6; font-size: 1.1em;"></p>
            <button onclick="closeModal()">Continuar buscando</button>
        </div>
    </div>

    <script>
        const wordsData = {
            'CIVILES': 'Derechos que protegen la libertad individual frente a cualquier restricción indebida por parte de gobiernos o entes privados.',
            'POLITICOS': 'Permiten a los ciudadanos participar en la vida pública y en la formación de la voluntad del Estado.',
            'SOCIALES': 'Garantizan condiciones de vida dignas, como el derecho a la salud, la seguridad social y el bienestar.',
            'CULTURALES': 'Derechos relacionados con la identidad, el arte, la ciencia y la participación cultural.',
            'ECONOMICOS': 'Buscan asegurar el acceso a recursos básicos como el trabajo, alimentación y vivienda.',
            'SOLIDARIDAD': 'Derechos de los pueblos o de tercera generación, como el derecho a la paz y a un medio ambiente sano.',
            'LIBERTAD': 'Facultad natural que tiene el hombre de obrar de una manera o de otra, siendo responsable de sus actos.',
            'IGUALDAD': 'Derecho de todos los seres humanos a ser iguales en dignidad y a ser tratados con respeto.'
        };

        const words = Object.keys(wordsData);
        const gridSize = 15;
        let grid = Array(gridSize).fill().map(() => Array(gridSize).fill(''));
        let selectedCells = [];

        function initGame() {
            // Direcciones: [fila, columna]
            const directions = [
                [0, 1], [0, -1], [1, 0], [-1, 0], // H y V
                [1, 1], [1, -1], [-1, 1], [-1, -1] // Diagonales
            ];

            words.forEach(word => {
                let placed = false;
                while (!placed) {
                    let dir = directions[Math.floor(Math.random() * directions.length)];
                    let row = Math.floor(Math.random() * gridSize);
                    let col = Math.floor(Math.random() * gridSize);

                    // Verificar si cabe
                    let canPlace = true;
                    for (let i = 0; i < word.length; i++) {
                        let r = row + (dir[0] * i);
                        let c = col + (dir[1] * i);
                        if (r < 0 || r >= gridSize || c < 0 || c >= gridSize || (grid[r][c] !== '' && grid[r][c] !== word[i])) {
                            canPlace = false;
                            break;
                        }
                    }

                    if (canPlace) {
                        for (let i = 0; i < word.length; i++) {
                            grid[row + (dir[0] * i)][col + (dir[1] * i)] = word[i];
                        }
                        placed = true;
                    }
                }
            });

            // Dibujar
            const gridEl = document.getElementById('grid');
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    if (grid[r][c] === '') grid[r][c] = "ABCDEFGHIJKLMNOPQRSTUVWXYZ"[Math.floor(Math.random() * 26)];
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.textContent = grid[r][c];
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    cell.onclick = () => toggleSelect(cell);
                    gridEl.appendChild(cell);
                }
            }

            const listContainer = document.getElementById('word-list');
            words.forEach(w => {
                const item = document.createElement('div');
                item.className = 'word-item';
                item.id = 'word-' + w;
                item.textContent = w;
                listContainer.appendChild(item);
            });
        }

        function toggleSelect(cell) {
            if (cell.classList.contains('found')) return;
            cell.classList.toggle('selected');
            checkSelection();
        }

        function checkSelection() {
            let selected = document.querySelectorAll('.cell.selected');
            let text = Array.from(selected).map(el => el.textContent).join('');
            let revText = text.split('').reverse().join('');

            words.forEach(w => {
                if ((text === w || revText === w) && !document.getElementById('word-'+w).classList.contains('strikethrough')) {
                    selected.forEach(el => {
                        el.classList.remove('selected');
                        el.classList.add('found');
                    });
                    document.getElementById('word-' + w).classList.add('strikethrough');
                    showDefinition(w);
                }
            });
        }

        function showDefinition(word) {
            document.getElementById('modal-title').textContent = "¡Encontraste: " + word + "!";
            document.getElementById('modal-desc').textContent = wordsData[word];
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            // Limpiar selecciones que no formaron palabra
            document.querySelectorAll('.cell.selected').forEach(el => el.classList.remove('selected'));
        }

        initGame();
    </script>
</body>
</html>
